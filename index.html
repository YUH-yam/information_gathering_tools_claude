<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<!--
  status-bar-style:
   - "default" / "black" にすると、iOS は OS のステータスバー領域を確保し、
     コンテンツ側に被らせない（Dynamic Island/時計と被らない）
   - "black-translucent" は侵入させる仕様。今回は確実性優先で "default" を採用
-->
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="時流インサイト" />
<meta name="description" content="国内外の時流を低い認知負荷で集め、示唆に変える個人用インテリジェンスツール" />
<title>時流インサイト・ログ | Insight Intake</title>

<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icons/icon.svg" />

<link rel="stylesheet" href="./styles/base.css" />
<link rel="stylesheet" href="./styles/layout.css" />
<link rel="stylesheet" href="./styles/components.css" />
<link rel="stylesheet" href="./styles/views.css" />
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-mark">時</div>
    <div>
      <div class="brand-title">時流インサイト・ログ<span class="brand-sub">Insight Intake</span></div>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:6px;">
    <span class="streak-chip" id="streakChip">🔥 0日</span>
    <button class="icon-btn" id="openSettings" title="設定" aria-label="設定">⚙</button>
  </div>
</header>

<main id="view" role="main"></main>

<nav class="bottom-nav" id="nav" aria-label="メインナビゲーション">
  <button data-route="home" class="active" type="button"><span class="emoji">🏠</span>ホーム</button>
  <button data-route="today" type="button"><span class="emoji">👀</span>今日見る</button>
  <button data-route="saved" type="button"><span class="emoji">📥</span>保存</button>
  <button data-route="memos" type="button"><span class="emoji">📝</span>メモ</button>
  <button data-route="reviews" type="button"><span class="emoji">📊</span>振り返り</button>
</nav>

<noscript>
  <div style="padding:20px; text-align:center; color:#fcd34d;">
    このアプリの動作には JavaScript が必要です。ブラウザの設定で有効化してください。
  </div>
</noscript>

<script type="module" src="./js/app.js"></script>
</body>
</html>
